# Build and test open-bambu-networking on Linux x86_64 and aarch64.
#
# Version strategy: the plugin must report a string whose first 8 characters
# match Bambu Studio's SLIC3R_VERSION. We therefore look up the most recent
# tag in https://github.com/bambulab/BambuStudio.git at CI time, strip the
# leading "v", and bump the last component to "99" (same rule ./configure
# uses for local auto-detection). This means CI follows upstream releases
# automatically -- no manual version bumps in this repo.
#
# Artifacts (one set per architecture):
#   * libbambu_networking.so
#   * libBambuSource.so
#   * liblive555.so
#   * network_plugins.json

name: Build

on:
  push:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: '15 2 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, architecture-independent check: compare the ABI surface
  # (bambu_networking.hpp + NetworkAgent.hpp + bambu_network_* dlsym list)
  # at the most recent bambulab/BambuStudio tag on github.com against the
  # baseline under tools/abi_snapshot/vMM.mm.pp/ (series from the tag).
  # See tools/check_abi_compat.sh for the full list of checks.
  abi-compat:
    name: abi-compat
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl git

      - name: Check ABI against latest upstream Bambu Studio tag
        run: tools/check_abi_compat.sh

  build:
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config ca-certificates git \
            libcjson-dev uthash-dev libcurl4-openssl-dev libssl-dev zlib1g-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libpng-dev libjpeg-dev

      - name: Resolve plugin version from upstream Bambu Studio
        id: ver
        run: |
          set -eu
          tag=$(git ls-remote --tags --refs \
                   https://github.com/bambulab/BambuStudio.git 'refs/tags/v*' \
                 | awk -F/ '{print $NF}' \
                 | sort -V \
                 | tail -n1)
          if [ -z "$tag" ]; then
              echo "::error::could not list tags at bambulab/BambuStudio" >&2
              exit 1
          fi
          upstream=${tag#v}
          plugin=$(printf '%s' "$upstream" | sed -E 's/\.[0-9]+$/.99/')
          echo "upstream tag    : $tag"
          echo "upstream version: $upstream"
          echo "plugin version  : $plugin"
          {
              echo "upstream_tag=$tag"
              echo "upstream_version=$upstream"
              echo "plugin_version=$plugin"
          } >> "$GITHUB_OUTPUT"

      - name: Configure
        run: |
          ./configure \
            --build-type=Release \
            --vendor-mosquitto \
            --enable-tests \
            --with-version='${{ steps.ver.outputs.plugin_version }}' \
            --no-conf-patch

      - name: Build
        run: make -j"$(nproc)"

      - name: Run tests
        # The only ctest target that does real I/O is `lan_live`, and it
        # self-skips when OBN_PRINTER_IP / _SERIAL / _ACCESS_CODE are unset,
        # which is always the case here. `plugin_symbols` is a pure dlopen
        # smoke test and exercises every ABI symbol Studio looks up.
        run: make test

      - name: Verify built plugin exports every ABI symbol
        # `abi-compat` job above compares source-side files only. This step
        # additionally nm's the freshly built .so to confirm we did not
        # lose any exported entry point in this architecture's toolchain.
        run: tools/check_abi_compat.sh --so=build/libbambu_networking.so

      - name: Stage artifacts
        run: |
          set -eu
          mkdir -p dist
          cp build/libbambu_networking.so dist/
          cp build/libBambuSource.so      dist/
          cp build/liblive555.so          dist/
          cp build/network_plugins.json   dist/
          ls -l dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: open-bambu-networking-linux-${{ matrix.arch }}-${{ steps.ver.outputs.plugin_version }}
          path: dist/
          if-no-files-found: error

  # Windows build. Uses MSVC + vcpkg (manifest mode) to produce the
  # three DLLs Studio loads on Windows: bambu_networking.dll,
  # BambuSource.dll, live555.dll. Camera backend is ffmpeg (no
  # GStreamer on Windows, see CMakeLists.txt).
  build-windows:
    name: windows-x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/.vcpkg
          vcpkgJsonGlob: vcpkg.json

      - name: Resolve plugin version from upstream Bambu Studio
        id: ver
        shell: pwsh
        run: |
          $tag = (git ls-remote --tags --refs `
                    https://github.com/bambulab/BambuStudio.git 'refs/tags/v*' `
                    | ForEach-Object { ($_ -split '/')[-1] }
                    | Sort-Object { [version]($_ -replace '^v','') }
                    | Select-Object -Last 1)
          if (-not $tag) { Write-Error "could not list tags"; exit 1 }
          $upstream = $tag -replace '^v',''
          $plugin = $upstream -replace '\.[0-9]+$','.99'
          Write-Host "upstream tag    : $tag"
          Write-Host "upstream version: $upstream"
          Write-Host "plugin version  : $plugin"
          "upstream_tag=$tag"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "upstream_version=$upstream" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "plugin_version=$plugin"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Configure
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "${{ github.workspace }}/.vcpkg"
          ./configure.ps1 `
            -WithVersion '${{ steps.ver.outputs.plugin_version }}' `
            -EnableTests `
            -NoConfPatch `
            -CMakeArg '-DOBN_VENDOR_MOSQUITTO=ON'

      - name: Build
        shell: pwsh
        run: ./build.ps1 -Parallel

      - name: Run tests
        shell: pwsh
        run: |
          . ./config.ps1
          ctest --test-dir $ObnBuildDir -C $ObnBuildType --output-on-failure

      - name: Stage artifacts
        shell: pwsh
        run: |
          . ./config.ps1
          New-Item -ItemType Directory -Force dist | Out-Null
          $cfg = $ObnBuildType
          Copy-Item -Force "$ObnBuildDir/$cfg/bambu_networking.dll" dist/
          Copy-Item -Force "$ObnBuildDir/$cfg/BambuSource.dll"      dist/
          Copy-Item -Force "$ObnBuildDir/$cfg/live555.dll"          dist/
          Copy-Item -Force "$ObnBuildDir/network_plugins.json"      dist/
          Get-ChildItem dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: open-bambu-networking-windows-x64-${{ steps.ver.outputs.plugin_version }}
          path: dist/
          if-no-files-found: error
